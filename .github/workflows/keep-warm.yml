name: Keep warm

# Render's free tier spins the API down after ~15 min idle (first request then
# takes ~60s). Ping /health every 10 min so the demo stays responsive.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -fsS https://agentic-rag-ai-fspt.onrender.com/health || true
