# One-command local stack for reviewers who have Docker: Postgres+pgvector + the
# AI service. NOTE: this is a demonstration artifact — the dev machine runs
# Postgres on Neon and the API under uvicorn (no Docker, see CLAUDE.md). Production
# deploys to Render/Vercel/Neon. This compose file exists to show the service is
# fully containerizable and to let anyone with Docker run the backend in one line:
#
#   docker compose up --build
#   # then, in the running container, create the schema + ingest the corpus:
#   docker compose exec ai python -m scripts.init_db
#   docker compose exec ai python -m scripts.fetch_corpus
#   docker compose exec ai python -m scripts.ingest      # needs EMBEDDING_API_KEY
#
# Health: GET http://localhost:8000/health (liveness, no DB needed)
#         GET http://localhost:8000/db/health (checks the Postgres connection)

services:
  db:
    # Official pgvector image = Postgres 16 with the vector extension preinstalled.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      # The ai service waits for this to pass before starting.
      test: ["CMD-SHELL", "pg_isready -U rag -d rag"]
      interval: 3s
      timeout: 3s
      retries: 10

  ai:
    build: ./ai
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Point the app at the bundled Postgres (the compose network resolves "db").
      DATABASE_URL: postgresql://rag:rag@db:5432/rag
      PORT: "8000"
      CORS_ORIGINS: http://localhost:3000
      # Optional API keys — pass through from the host env if set (else features
      # that need them degrade gracefully).
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      COHERE_API_KEY: ${COHERE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "8000:8000"

volumes:
  pgdata:
